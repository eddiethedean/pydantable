name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  shared-ci:
    uses: ./.github/workflows/_shared-ci.yml
    with:
      python-versions: '["3.10", "3.11", "3.12", "3.13"]'

  publish-pypi-manylinux-x86_64:
    name: PyPI manylinux x86_64 + sdist
    runs-on: ubuntu-latest
    needs: [shared-ci]
    steps:
      - uses: actions/checkout@v5

      # Default manylinux Docker image (no `container: off`, no `--zig` on host).
      - name: Build wheels and sdist (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-unknown-linux-gnu
          command: build
          args: --release --sdist -o dist
          manylinux: "2_17"

      - name: Publish to PyPI (twine)
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip "twine>=5,<6" "pkginfo>=1.12.1.2"
          python -m twine upload --skip-existing dist/*.whl dist/*.tar.gz

  publish-pypi-manylinux-aarch64:
    name: PyPI manylinux aarch64
    runs-on: ubuntu-24.04-arm
    needs: [shared-ci]
    steps:
      - uses: actions/checkout@v5

      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64-unknown-linux-gnu
          command: build
          args: --release -o dist
          manylinux: "2_28"

      - name: Publish to PyPI (twine)
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip "twine>=5,<6" "pkginfo>=1.12.1.2"
          python -m twine upload --skip-existing dist/*.whl

  publish-pypi-mac:
    name: PyPI macOS ${{ matrix.target }}
    runs-on: macos-latest
    needs: [shared-ci]
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v5

      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          command: build
          args: --release -i 3.11 -i 3.12 -i 3.13 -o dist

      - name: Publish to PyPI (twine)
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip "twine>=5,<6" "pkginfo>=1.12.1.2"
          python -m twine upload --skip-existing dist/*.whl

  publish-pypi-musllinux-x86_64:
    name: PyPI musllinux x86_64
    runs-on: ubuntu-latest
    needs: [shared-ci]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-unknown-linux-musl
          command: build
          args: --release --zig --compatibility musllinux_1_2 -i 3.12 -o dist

      - name: Publish to PyPI (twine)
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip "twine>=5,<6" "pkginfo>=1.12.1.2"
          python -m twine upload --skip-existing dist/*.whl

  publish-pypi-musllinux-aarch64:
    name: PyPI musllinux aarch64
    runs-on: ubuntu-24.04-arm
    needs: [shared-ci]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64-unknown-linux-musl
          command: build
          args: --release --zig --compatibility musllinux_1_2 -i 3.12 -o dist

      - name: Publish to PyPI (twine)
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip "twine>=5,<6" "pkginfo>=1.12.1.2"
          python -m twine upload --skip-existing dist/*.whl

  publish-pypi-windows-x86_64:
    name: PyPI Windows x86_64
    runs-on: windows-latest
    needs: [shared-ci]
    steps:
      - uses: actions/checkout@v5

      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-pc-windows-msvc
          command: build
          args: --release -o dist

      - name: Publish to PyPI (twine)
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip "twine>=5,<6" "pkginfo>=1.12.1.2"
          python -m twine upload --skip-existing dist/*.whl

  publish-pypi-windows-arm64:
    name: PyPI Windows aarch64
    runs-on: windows-11-arm
    needs: [shared-ci]
    steps:
      - uses: actions/checkout@v5

      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64-pc-windows-msvc
          command: build
          args: --release -o dist

      - name: Publish to PyPI (twine)
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip "twine>=5,<6" "pkginfo>=1.12.1.2"
          python -m twine upload --skip-existing dist/*.whl

