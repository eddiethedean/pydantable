name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pydantable-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('pydantable-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check format
        working-directory: pydantable-core
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pydantable-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('pydantable-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Clippy
        working-directory: pydantable-core
        run: cargo clippy -- -D warnings

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pydantable-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('pydantable-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Audit
        working-directory: pydantable-core
        run: cargo audit --ignore RUSTSEC-2025-0141

  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pydantable-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('pydantable-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Deny
        working-directory: pydantable-core
        run: cargo deny check advisories bans sources

  python-lint:
    name: Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff format
        run: ruff format --check .

      - name: Ruff check
        run: ruff check .

  python-tests:
    name: Python tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pydantable-core/target
          key: ${{ runner.os }}-cargo-py-${{ hashFiles('pydantable-core/Cargo.lock') }}-${{ matrix.python-version }}
          restore-keys: |
            ${{ runner.os }}-cargo-py-

      - name: Create venv
        run: python -m venv .venv

      - name: Set Python path
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "PY=.venv/Scripts/python" >> $GITHUB_ENV
          else
            echo "PY=.venv/bin/python" >> $GITHUB_ENV
          fi

      - name: Install test deps
        run: |
          $PY -m pip install -U pip
          $PY -m pip install maturin pytest pytest-asyncio pytest-xdist "numpy>=1.24" "pandas>=2.0" "hypothesis>=6.0" "pyarrow>=14.0" "fastapi>=0.100" "httpx>=0.24" "python-multipart>=0.0.6"

      - name: Build and install extension
        run: $PY -m maturin develop --release
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/.venv

      - name: Install Polars (Ubuntu Python 3.11)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: $PY -m pip install "polars>=1.0.0,<2"

      - name: Run Python tests
        env:
          MATRIX_OS: ${{ matrix.os }}
        run: |
          if [ "$MATRIX_OS" = "ubuntu-latest" ]; then
            $PY -m pytest -q -n auto
          else
            $PY -m pytest -q
          fi

      - name: Verify doc examples (Ubuntu Python 3.11)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: PYTHONPATH=python $PY scripts/verify_doc_examples.py

  publish-pypi-manylinux-x86_64:
    name: PyPI manylinux x86_64 + sdist
    runs-on: ubuntu-latest
    needs: [format, clippy, audit, deny, python-lint, python-tests]
    steps:
      - uses: actions/checkout@v5

      # Default manylinux Docker image (no `container: off`, no `--zig` on host).
      - name: Build wheels and sdist (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-unknown-linux-gnu
          command: build
          args: --release --sdist -o dist
          manylinux: "2_17"

      - name: Publish to PyPI (twine)
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip "twine<6"
          python -m twine upload --skip-existing dist/*

  publish-pypi-manylinux-aarch64:
    name: PyPI manylinux aarch64
    runs-on: ubuntu-24.04-arm
    needs: [format, clippy, audit, deny, python-lint, python-tests]
    steps:
      - uses: actions/checkout@v5

      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64-unknown-linux-gnu
          command: build
          args: --release -o dist
          manylinux: "2_28"

      - name: Publish to PyPI (twine)
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip "twine<6"
          python -m twine upload --skip-existing dist/*

  publish-pypi-mac:
    name: PyPI macOS ${{ matrix.target }}
    runs-on: macos-latest
    needs: [format, clippy, audit, deny, python-lint, python-tests]
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v5

      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          command: build
          args: --release -i 3.11 -i 3.12 -i 3.13 -o dist

      - name: Publish to PyPI (twine)
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip "twine<6"
          python -m twine upload --skip-existing dist/*

  publish-pypi-musllinux-x86_64:
    name: PyPI musllinux x86_64
    runs-on: ubuntu-latest
    needs: [format, clippy, audit, deny, python-lint, python-tests]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-unknown-linux-musl
          command: build
          args: --release --zig --compatibility musllinux_1_2 -i 3.12 -o dist

      - name: Publish to PyPI (twine)
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip "twine<6"
          python -m twine upload --skip-existing dist/*

  publish-pypi-musllinux-aarch64:
    name: PyPI musllinux aarch64
    runs-on: ubuntu-24.04-arm
    needs: [format, clippy, audit, deny, python-lint, python-tests]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64-unknown-linux-musl
          command: build
          args: --release --zig --compatibility musllinux_1_2 -i 3.12 -o dist

      - name: Publish to PyPI (twine)
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip "twine<6"
          python -m twine upload --skip-existing dist/*

  publish-pypi-windows-x86_64:
    name: PyPI Windows x86_64
    runs-on: windows-latest
    needs: [format, clippy, audit, deny, python-lint, python-tests]
    steps:
      - uses: actions/checkout@v5

      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-pc-windows-msvc
          command: build
          args: --release -o dist

      - name: Publish to PyPI (twine)
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip "twine<6"
          python -m twine upload --skip-existing dist/*

  publish-pypi-windows-arm64:
    name: PyPI Windows aarch64
    runs-on: windows-11-arm
    needs: [format, clippy, audit, deny, python-lint, python-tests]
    steps:
      - uses: actions/checkout@v5

      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64-pc-windows-msvc
          command: build
          args: --release -o dist

      - name: Publish to PyPI (twine)
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip "twine<6"
          python -m twine upload --skip-existing dist/*

