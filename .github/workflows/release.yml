name: Release

on:
  push:
    tags:
      - "v*"

# Explicit permissions: unspecified scopes default to ``none``. ``shared-ci`` uses
# ``actions/cache`` and ``actions/upload-artifact``, which need ``actions: write``.
permissions:
  contents: read
  actions: write

# PyPI targets: pydantable-protocol, pydantable, pydantable-native only.
# Do not add a pydantable-meta job — that metapackage was removed from the repo.

jobs:
  shared-ci:
    uses: ./.github/workflows/_shared-ci.yml
    with:
      python-versions: '["3.10", "3.11", "3.12", "3.13"]'

  # Pure-Python protocol must land first (pins in pydantable and pydantable-native).
  publish-pypi-protocol:
    name: PyPI pydantable-protocol (sdist + wheel)
    runs-on: ubuntu-latest
    needs: [shared-ci]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build and publish
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install -U pip "build>=1.2" "twine>=5,<6" "pkginfo>=1.12.1.2"
          mkdir -p dist
          (cd pydantable-protocol && python -m build --sdist --wheel -o ../dist)
          python -m twine upload --skip-existing dist/pydantable_protocol-*

  # Main Python package (setuptools); depends only on protocol on PyPI.
  # After protocol: wait for native sdist + manylinux x86_64 wheels so
  # ``pip install pydantable`` can resolve ``pydantable-native==…`` immediately.
  publish-pypi-pydantable:
    name: PyPI pydantable (sdist + wheel)
    runs-on: ubuntu-latest
    needs: [shared-ci, publish-pypi-protocol, publish-pypi-manylinux-x86_64]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build and publish
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install -U pip "build>=1.2" "twine>=5,<6" "pkginfo>=1.12.1.2"
          mkdir -p dist
          python -m build --sdist --wheel -o dist
          python -m twine upload --skip-existing dist/pydantable-*

  publish-pypi-manylinux-x86_64:
    name: PyPI manylinux x86_64 + sdist (pydantable-native)
    runs-on: ubuntu-latest
    needs: [shared-ci, publish-pypi-protocol]
    steps:
      - uses: actions/checkout@v5

      # ``setup-python`` does not affect the manylinux container; pass interpreters explicitly.
      # https://github.com/PyO3/maturin-action#manylinux-docker-container
      - name: Build wheels and sdist (maturin)
        uses: PyO3/maturin-action@v1
        with:
          working-directory: pydantable-native
          target: x86_64-unknown-linux-gnu
          command: build
          # ``abi3`` (``pydantable-core``): one ``cp39-abi3`` wheel per platform; one interpreter is enough.
          args: >-
            --release --sdist --compatibility pypi -o ../dist
            -i python3.9
          manylinux: "2_17"

      - name: Publish to PyPI (twine)
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip "twine>=5,<6" "pkginfo>=1.12.1.2"
          python -m twine upload --skip-existing dist/pydantable_native-*.whl dist/pydantable_native-*.tar.gz

  publish-pypi-manylinux-aarch64:
    name: PyPI manylinux aarch64 (pydantable-native)
    runs-on: ubuntu-24.04-arm
    needs: [shared-ci, publish-pypi-protocol]
    steps:
      - uses: actions/checkout@v5

      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          working-directory: pydantable-native
          target: aarch64-unknown-linux-gnu
          command: build
          args: >-
            --release --compatibility pypi -o ../dist
            -i python3.9
          manylinux: "2_28"

      - name: Publish to PyPI (twine)
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip "twine>=5,<6" "pkginfo>=1.12.1.2"
          python -m twine upload --skip-existing dist/pydantable_native-*.whl

  publish-pypi-mac:
    name: PyPI macOS ${{ matrix.target }} (pydantable-native)
    runs-on: macos-latest
    needs: [shared-ci, publish-pypi-protocol]
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v5

      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          working-directory: pydantable-native
          target: ${{ matrix.target }}
          command: build
          args: >-
            --release --compatibility pypi
            -i 3.9 -o ../dist

      - name: Publish to PyPI (twine)
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip "twine>=5,<6" "pkginfo>=1.12.1.2"
          python -m twine upload --skip-existing dist/pydantable_native-*.whl

  publish-pypi-musllinux-x86_64:
    name: PyPI musllinux x86_64 (pydantable-native)
    runs-on: ubuntu-latest
    needs: [shared-ci, publish-pypi-protocol]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          working-directory: pydantable-native
          target: x86_64-unknown-linux-musl
          command: build
          args: >-
            --release --zig --compatibility musllinux_1_2 -o ../dist
            -i python3.9

      - name: Publish to PyPI (twine)
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip "twine>=5,<6" "pkginfo>=1.12.1.2"
          python -m twine upload --skip-existing dist/pydantable_native-*.whl

  publish-pypi-musllinux-aarch64:
    name: PyPI musllinux aarch64 (pydantable-native)
    runs-on: ubuntu-24.04-arm
    needs: [shared-ci, publish-pypi-protocol]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          working-directory: pydantable-native
          target: aarch64-unknown-linux-musl
          command: build
          args: >-
            --release --zig --compatibility musllinux_1_2 -o ../dist
            -i python3.9

      - name: Publish to PyPI (twine)
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip "twine>=5,<6" "pkginfo>=1.12.1.2"
          python -m twine upload --skip-existing dist/pydantable_native-*.whl

  publish-pypi-windows-x86_64:
    name: PyPI Windows x86_64 (pydantable-native, cp39-abi3)
    runs-on: windows-latest
    needs: [shared-ci, publish-pypi-protocol]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          working-directory: pydantable-native
          target: x86_64-pc-windows-msvc
          command: build
          args: --release --compatibility pypi -o ../dist

      - name: Publish to PyPI (twine)
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip "twine>=5,<6" "pkginfo>=1.12.1.2"
          python -m twine upload --skip-existing dist/pydantable_native-*.whl

  # ``actions/setup-python`` does not ship CPython 3.9/3.10 for Windows ARM64 (see versions-manifest).
  publish-pypi-windows-arm64:
    name: PyPI Windows aarch64 (pydantable-native, cp39-abi3)
    runs-on: windows-11-arm
    needs: [shared-ci, publish-pypi-protocol]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          working-directory: pydantable-native
          target: aarch64-pc-windows-msvc
          command: build
          args: --release --compatibility pypi -o ../dist

      - name: Publish to PyPI (twine)
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip "twine>=5,<6" "pkginfo>=1.12.1.2"
          python -m twine upload --skip-existing dist/pydantable_native-*.whl
