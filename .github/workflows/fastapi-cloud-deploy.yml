name: Deploy pydantable-rag (FastAPI Cloud)

on:
  push:
    branches: [main]
    paths:
      - "pydantable-rag/**"
      - "docs/**"
      - ".github/workflows/fastapi-cloud-deploy.yml"
      - ".github/workflows/rag-database.yml"
  workflow_dispatch:

jobs:
  build-rag-database:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync pydantable-rag
        working-directory: pydantable-rag
        run: uv sync --all-extras

      - name: Build vector database (from monorepo docs/)
        working-directory: pydantable-rag
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: uv run python scripts/build_index_ci.py

      - name: Upload DB for deploy step
        uses: actions/upload-artifact@v4
        with:
          name: rag-db-for-deploy
          path: pydantable-rag/data/pydantable_vectors.db
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: [build-rag-database]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download prebuilt vector database
        uses: actions/download-artifact@v4
        with:
          name: rag-db-for-deploy
          path: pydantable-rag/data/

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install FastAPI Cloud CLI
        run: python -m pip install -U pip fastapi-cloud-cli

      - name: Deploy to FastAPI Cloud
        env:
          FASTAPI_CLOUD_TOKEN: ${{ secrets.FASTAPI_CLOUD_TOKEN }}
          FASTAPI_CLOUD_APP_ID: ${{ secrets.FASTAPI_CLOUD_APP_ID }}
        run: python -m fastapi_cloud_cli deploy pydantable-rag --app-id "${FASTAPI_CLOUD_APP_ID}"
