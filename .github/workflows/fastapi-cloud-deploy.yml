name: Deploy pydantable-rag (FastAPI Cloud)

on:
  push:
    branches: [main]
    paths:
      - "pydantable-rag/**"
      - "docs/**"
      - ".github/workflows/fastapi-cloud-deploy.yml"
      - ".github/workflows/rag-database.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify committed vector database
        run: |
          f=pydantable-rag/data/pydantable_vectors.db
          if [ ! -f "$f" ]; then
            echo "::error::Missing $f. Build once locally (needs OPENAI_API_KEY): cd pydantable-rag && uv run python scripts/build_index_ci.py — then commit the DB."
            exit 1
          fi
          sz=$(wc -c < "$f" | tr -d ' ')
          if [ "$sz" -lt 1024 ]; then
            echo "::error::Vector DB looks too small (${sz} bytes)."
            exit 1
          fi
          echo "Vector DB present (${sz} bytes)."

      - name: Show app version being deployed
        run: grep -E '^version\s*=' pydantable-rag/pyproject.toml | head -1

      - name: Reminder — runtime OPENAI_API_KEY on FastAPI Cloud
        run: |
          echo "::notice title=FastAPI Cloud::Set OPENAI_API_KEY on the app for query embeddings (and chat if RAG_LLM_BACKEND=openai). Deploy does not rebuild the index; commit data/pydantable_vectors.db after local ingest."

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install FastAPI Cloud CLI
        run: python -m pip install -U pip fastapi-cloud-cli

      - name: Deploy to FastAPI Cloud
        env:
          FASTAPI_CLOUD_TOKEN: ${{ secrets.FASTAPI_CLOUD_TOKEN }}
          FASTAPI_CLOUD_APP_ID: ${{ secrets.FASTAPI_CLOUD_APP_ID }}
        run: python -m fastapi_cloud_cli deploy pydantable-rag --app-id "${FASTAPI_CLOUD_APP_ID}"
