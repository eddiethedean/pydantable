name: Deploy pydantable-rag (FastAPI Cloud)

on:
  push:
    branches: [main]
    paths:
      - "pydantable-rag/**"
      - "docs/**"
      - ".github/workflows/fastapi-cloud-deploy.yml"
      - ".github/workflows/rag-database.yml"
  workflow_dispatch:

jobs:
  build-rag-database:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      HF_HOME: ${{ github.workspace }}/pydantable-rag/hf_baked
      HF_HUB_CACHE: ${{ github.workspace }}/pydantable-rag/hf_baked/hub
      TRANSFORMERS_CACHE: ${{ github.workspace }}/pydantable-rag/hf_baked/hub
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync pydantable-rag
        working-directory: pydantable-rag
        run: uv sync --all-extras

      - name: Bake Hugging Face Hub cache (embed + LLM snapshots)
        working-directory: pydantable-rag
        run: uv run python scripts/prep_hf_cache_ci.py

      - name: Build vector database (from monorepo docs/)
        working-directory: pydantable-rag
        run: uv run python scripts/build_index_ci.py

      - name: Upload DB + Hub cache for deploy
        uses: actions/upload-artifact@v4
        with:
          name: rag-deploy-bundle
          path: |
            pydantable-rag/data/pydantable_vectors.db
            pydantable-rag/hf_baked
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: [build-rag-database]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download prebuilt DB and Hugging Face cache
        uses: actions/download-artifact@v4
        with:
          name: rag-deploy-bundle
          path: .

      - name: Show app version being deployed
        run: grep -E '^version\s*=' pydantable-rag/pyproject.toml | head -1

      - name: Reminder — runtime HF_TOKEN on FastAPI Cloud
        run: |
          echo "::notice title=FastAPI Cloud::Add HF_TOKEN to the app's environment in the FastAPI Cloud dashboard. GitHub HF_TOKEN only applies to CI; anonymous Hub access causes rate limits and replica churn."

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install FastAPI Cloud CLI
        run: python -m pip install -U pip fastapi-cloud-cli

      - name: Deploy to FastAPI Cloud
        env:
          FASTAPI_CLOUD_TOKEN: ${{ secrets.FASTAPI_CLOUD_TOKEN }}
          FASTAPI_CLOUD_APP_ID: ${{ secrets.FASTAPI_CLOUD_APP_ID }}
        run: python -m fastapi_cloud_cli deploy pydantable-rag --app-id "${FASTAPI_CLOUD_APP_ID}"
