name: Shared CI checks

on:
  workflow_call:
    inputs:
      python-versions:
        description: JSON array of Python versions for python-tests matrix
        required: false
        type: string
        default: '["3.10", "3.11", "3.12", "3.13"]'

jobs:
  python-lint:
    name: Python (ruff, ty)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ruff and ty
        run: |
          python -m pip install -U pip
          python -m pip install ruff "ty>=0.0.28" pyright
          python -m pip install -e ./pydantable-protocol
          python -m pip install "pydantic>=2.0,<3" "typing-extensions>=4.7" \
            "sqlalchemy>=2.0,<3" "sqlmodel>=0.0.22,<0.1" \
            "jinja2>=3.1"

      - name: Ruff format
        run: ruff format --check .

      - name: Ruff check
        run: ruff check .

      - name: Engine bypass (no direct _core outside allowlist)
        run: python scripts/check_engine_bypass.py

      - name: ty
        run: python -m ty check

      - name: Pyright
        run: python -m pyright --project pyrightconfig.json

      - name: Typing artifacts are up to date
        run: |
          python scripts/generate_typing_artifacts.py
          git diff --exit-code

  python-package-contents:
    name: Packaging (sdist excludes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install -U pip
          python -m pip install "build>=1.2"
          python -m pip install "maturin>=1.4,<2.0"

      - name: Build sdists (protocol + core + native)
        run: |
          (cd pydantable-protocol && python -m build --sdist -o ../dist)
          python -m build --sdist -o dist
          (cd pydantable-native && maturin build --sdist -o ../dist)

      - name: Verify sdist excludes generated docs
        run: |
          python - <<'PY'
          import glob
          import tarfile

          # Core ``pydantable`` sdist only (not ``pydantable_protocol`` / native).
          sdists = sorted(glob.glob("dist/pydantable-*.tar.gz"))
          if not sdists:
            raise SystemExit("No pydantable sdist in dist/pydantable-*.tar.gz")
          path = sdists[0]

          bad_prefixes = ("docs/_build/", "site/")
          bad = []
          with tarfile.open(path, "r:gz") as tf:
            for m in tf.getmembers():
              # sdist paths are usually like: pydantable-1.0.0/docs/_build/...
              name = m.name.split("/", 1)[1] if "/" in m.name else m.name
              if any(name.startswith(p) for p in bad_prefixes):
                bad.append(m.name)

          if bad:
            raise SystemExit("sdist contains excluded paths:\\n" + "\\n".join(bad[:50]))
          print("OK: sdist excludes docs/_build and site/")
          PY

  docs:
    name: Docs (mkdocs --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install docs dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install -U pip
          .venv/bin/python -m pip install "maturin>=1.4,<2.0"
          .venv/bin/python -m pip install -e ./pydantable-protocol
          (cd pydantable-native && ../.venv/bin/python -m maturin develop --release)
          .venv/bin/python -m pip install -e ".[docs]"

      - name: Build docs (warnings as errors)
        env:
          NO_MKDOCS_2_WARNING: "1"
        run: .venv/bin/mkdocs build --strict

  wheel-smoke:
    name: Wheel smoke (install + import)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheels (protocol + core + native)
        run: |
          python -m pip install -U pip
          python -m pip install "build>=1.2"
          python -m pip install "maturin>=1.4,<2.0"
          (cd pydantable-protocol && python -m build -o ../dist)
          python -m build -o dist
          (cd pydantable-native && maturin build --release -o ../dist)

      - name: Install wheel into fresh venv
        run: |
          python -m venv /tmp/pt_smoke_venv
          /tmp/pt_smoke_venv/bin/python -m pip install -U pip
          /tmp/pt_smoke_venv/bin/python -m pip install \
            dist/pydantable_protocol-*.whl \
            dist/pydantable-*.whl \
            dist/pydantable_native-*.whl

      - name: Smoke test (import + minimal execution)
        run: |
          /tmp/pt_smoke_venv/bin/python - <<'PY'
          from pydantable import DataFrame, Schema

          class Row(Schema):
            x: int

          df = DataFrame[Row]({"x": [1, 2, 3]})
          out = df.select("x").to_dict()
          assert out == {"x": [1, 2, 3]}
          print("OK")
          PY

      # Core wheels only — no ``[spark]`` (sparkdantic / pyspark / raikou-core). The PySpark
      # façade must import without optional Spark extras; ``pydantable.pyspark.sparkdantic`` is lazy.
      - name: Smoke test (PySpark façade import without optional Spark stack)
        run: |
          /tmp/pt_smoke_venv/bin/python - <<'PY'
          import pydantable.pyspark as ps
          from pydantable.pyspark import DataFrame, DataFrameModel, Expr, Schema

          assert ps.DataFrame is DataFrame
          assert ps.DataFrameModel is DataFrameModel
          print("OK pyspark façade")
          PY

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pydantable-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('pydantable-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check format
        run: cargo fmt --manifest-path pydantable-core/Cargo.toml -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Keep this aligned with rust-toolchain.toml so `cargo clippy` doesn't
          # fall back to the pinned toolchain without clippy installed.
          toolchain: 1.94.1
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pydantable-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('pydantable-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Clippy
        run: |
          cargo clippy --manifest-path pydantable-core/Cargo.toml --all-features --tests \
            -- -D warnings -W clippy::unwrap_used -W clippy::expect_used

      - name: Check no-default-features (rowwise skeleton)
        run: cargo check --manifest-path pydantable-core/Cargo.toml --no-default-features

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pydantable-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('pydantable-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # RUSTSEC-2025-0141: transitive advisory in optional Polars stack; tracked upstream.
      - name: Audit
        working-directory: pydantable-core
        run: cargo audit --ignore RUSTSEC-2025-0141

  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pydantable-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('pydantable-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Deny
        working-directory: pydantable-core
        run: cargo deny check advisories bans sources

  rust-tests:
    name: Rust unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Polars-backed plan tests import `polars`; PyO3 needs a known interpreter and site-packages on PYTHONPATH.
      - name: Install Python deps for Rust tests
        run: |
          PY="${{ steps.setup-python.outputs.python-path }}"
          "$PY" -m pip install -U pip
          "$PY" -m pip install "polars>=1,<2" numpy

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pydantable-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('pydantable-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Rust tests
        env:
          PYO3_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: |
          export PYTHONPATH="$("${{ steps.setup-python.outputs.python-path }}" -c "import site; print(site.getsitepackages()[0])")"
          cargo test --manifest-path pydantable-core/Cargo.toml --all-features

  python-tests:
    name: Python tests - ${{ matrix.os }} py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ${{ fromJson(inputs.python-versions) }}
    defaults:
      run:
        shell: bash
    needs: [python-lint, format, clippy, audit, deny, rust-tests]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        # Keep the Python test matrix lean: we only need `cargo`/`rustc` for maturin.
        # Installing extra components (clippy/rustfmt) has caused sporadic rustup
        # component conflicts on macOS runners.

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pydantable-core/target
          key: ${{ runner.os }}-cargo-py-${{ hashFiles('pydantable-core/Cargo.lock') }}-${{ matrix.python-version }}
          restore-keys: |
            ${{ runner.os }}-cargo-py-

      - name: Create venv
        run: python -m venv .venv

      # Absolute path so ``cd`` in later steps (e.g. maturin in ``pydantable-native/``) still works.
      - name: Set Python path
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "PY=$GITHUB_WORKSPACE/.venv/Scripts/python.exe" >> $GITHUB_ENV
          else
            echo "PY=$GITHUB_WORKSPACE/.venv/bin/python" >> $GITHUB_ENV
          fi

      # Use ``[dev]`` from ``pyproject.toml`` so CI matches local ``make install-dev`` / ``pip install -e ".[dev]"``.
      # JVM Spark engine tests also need ``raikou-core`` + ``pyspark`` (not listed in ``[dev]``).
      - name: Install maturin, native extension, and dev test dependencies
        run: |
          $PY -m pip install -U pip
          $PY -m pip install "maturin>=1.4,<2.0"
          $PY -m pip install -e ./pydantable-protocol
          (cd pydantable-native && $PY -m maturin develop --release)
          $PY -m pip install -e ".[dev]" "raikou-core==0.1.0" "pyspark>=3.4,<4"
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/.venv

      - name: Pytest
        env:
          MATRIX_OS: ${{ matrix.os }}
          PYVER: ${{ matrix.python-version }}
        run: |
          COV_ARGS=""
          if [ "$MATRIX_OS" = "ubuntu-latest" ] && [ "$PYVER" = "3.11" ]; then
            COV_ARGS="--cov=pydantable --cov-report=xml --cov-report=term-missing:skip-covered --cov-fail-under=83"
          fi
          # ``local[*]`` PySpark needs a JVM + Hadoop Windows shim (winutils); GHA Windows
          # runners are unreliable for that stack. Façade tests under ``tests/third_party/``
          # still run everywhere; only ``@pytest.mark.spark`` integration tests are skipped.
          #
          # On Windows, default xdist ``--dist=load`` plus flaky CPU detection has been seen
          # to yield pytest exit code 5; ``--dist=loadfile`` and ``--maxprocesses`` keep
          # parallelism while reducing that failure mode.
          if [ "$MATRIX_OS" = "windows-latest" ]; then
            $PY -m pytest -q -n auto --maxprocesses=8 --dist=loadfile $COV_ARGS -m "not spark"
          else
            $PY -m pytest -q -n auto $COV_ARGS
          fi

      - name: Upload coverage XML (Ubuntu Python 3.11)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        # v6 defaults to Node 24 (GitHub is deprecating Node 20 for actions).
        uses: actions/upload-artifact@v6
        with:
          name: coverage-xml-py311-ubuntu
          path: coverage.xml
          if-no-files-found: ignore

      - name: Verify doc examples (Ubuntu Python 3.11)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: PYTHONPATH=python $PY scripts/verify_doc_examples.py

  # Weekly (``schedule`` in ``ci.yml``): full suite with pytest-randomly after main ``python-tests`` succeeds.
  python-tests-random-order:
    name: Python tests (random order, ubuntu py3.11)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    needs: [python-tests]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pydantable-core/target
          key: ${{ runner.os }}-cargo-py-${{ hashFiles('pydantable-core/Cargo.lock') }}-3.11
          restore-keys: |
            ${{ runner.os }}-cargo-py-

      - name: Create venv
        run: python -m venv .venv

      - name: Set Python path
        run: echo "PY=$GITHUB_WORKSPACE/.venv/bin/python" >> $GITHUB_ENV

      - name: Install maturin, native extension, and dev test dependencies
        run: |
          $PY -m pip install -U pip
          $PY -m pip install "maturin>=1.4,<2.0"
          $PY -m pip install -e ./pydantable-protocol
          (cd pydantable-native && $PY -m maturin develop --release)
          $PY -m pip install -e ".[dev]" "raikou-core==0.1.0" "pyspark>=3.4,<4"
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/.venv

      - name: Pytest (randomized order)
        run: $PY -m pytest -q -n auto
