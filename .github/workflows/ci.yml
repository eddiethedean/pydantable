name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python-lint:
    name: Python (ruff, mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ruff and mypy
        run: |
          python -m pip install -U pip
          python -m pip install ruff mypy
          python -m pip install pydantic typing-extensions

      - name: Ruff format
        run: ruff format --check .

      - name: Ruff check
        run: ruff check .

      - name: Mypy
        run: mypy python/pydantable

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pydantable-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('pydantable-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check format
        run: cargo fmt --manifest-path pydantable-core/Cargo.toml -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pydantable-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('pydantable-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Clippy
        run: cargo clippy --manifest-path pydantable-core/Cargo.toml -- -D warnings

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pydantable-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('pydantable-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # RUSTSEC-2025-0141: transitive advisory in optional Polars stack; tracked upstream.
      - name: Audit
        working-directory: pydantable-core
        run: cargo audit --ignore RUSTSEC-2025-0141

  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pydantable-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('pydantable-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Deny
        working-directory: pydantable-core
        run: cargo deny check advisories bans sources

  rust-tests:
    name: Rust unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Polars-backed plan tests import `polars`; PyO3 needs a known interpreter and site-packages on PYTHONPATH (see Makefile rust-test).
      - name: Install Python deps for Rust tests
        run: |
          PY="${{ steps.setup-python.outputs.python-path }}"
          "$PY" -m pip install -U pip
          "$PY" -m pip install "polars>=1,<2" numpy

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pydantable-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('pydantable-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Rust tests
        env:
          PYO3_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: |
          export PYTHONPATH="$("${{ steps.setup-python.outputs.python-path }}" -c "import site; print(site.getsitepackages()[0])")"
          cargo test --manifest-path pydantable-core/Cargo.toml --all-features

  python-tests:
    name: Python tests - ${{ matrix.os }} py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    defaults:
      run:
        shell: bash
    needs: [python-lint, format, clippy, audit, deny, rust-tests]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pydantable-core/target
          key: ${{ runner.os }}-cargo-py-${{ hashFiles('pydantable-core/Cargo.lock') }}-${{ matrix.python-version }}
          restore-keys: |
            ${{ runner.os }}-cargo-py-

      - name: Create venv
        run: python -m venv .venv

      - name: Set Python path
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "PY=.venv/Scripts/python" >> $GITHUB_ENV
          else
            echo "PY=.venv/bin/python" >> $GITHUB_ENV
          fi

      - name: Install maturin and test deps
        run: |
          $PY -m pip install -U pip
          $PY -m pip install maturin pytest pytest-xdist pytest-cov "numpy>=1.24" "pandas>=2.0" "hypothesis>=6.0" "pyarrow>=14.0" "fastapi>=0.100" "httpx>=0.24"

      - name: Build and install extension
        run: $PY -m maturin develop --release
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/.venv

      - name: Install Polars (Ubuntu Python 3.11 — Python-side to_polars() tests)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: $PY -m pip install "polars>=1.0.0,<2"

      - name: Pytest
        env:
          MATRIX_OS: ${{ matrix.os }}
          PYVER: ${{ matrix.python-version }}
        run: |
          if [ "$MATRIX_OS" = "ubuntu-latest" ] && [ "$PYVER" = "3.11" ]; then
            $PY -m pytest -q -n auto --cov=pydantable --cov-report=term-missing --cov-report=xml
          elif [ "$MATRIX_OS" = "ubuntu-latest" ]; then
            $PY -m pytest -q -n auto
          else
            $PY -m pytest -q
          fi

      - name: Verify doc examples (Ubuntu Python 3.11)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: PYTHONPATH=python $PY scripts/verify_doc_examples.py

