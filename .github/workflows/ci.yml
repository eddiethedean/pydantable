name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        backend: ["polars", "pandas", "pyspark"]
    env:
      PYDANTABLE_BACKEND: ${{ matrix.backend }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install ruff
          python -m pip install .
          python -m pip install pytest

      - name: Ruff lint
        run: ruff check .

      - name: Pytest
        run: pytest -q

