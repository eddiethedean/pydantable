name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    # Weekly smoke: full pytest with pytest-randomly (see ``python-tests-random-order`` in _shared-ci.yml).
    - cron: "0 6 * * 0"

jobs:
  shared-ci:
    uses: ./.github/workflows/_shared-ci.yml
