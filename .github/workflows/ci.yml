name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  shared-ci:
    uses: ./.github/workflows/_shared-ci.yml

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    needs: [shared-ci]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # `pip install .` builds via Maturin and needs `rustc` on PATH before this job
      # materializes the Python SBOM from the installed distribution.
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install SBOM tools (Python)
        run: |
          python -m pip install -U pip
          python -m pip install "cyclonedx-bom>=7,<8"

      - name: Create Python SBOM (installed distribution)
        run: |
          python -m pip install .
          cyclonedx-py environment --of JSON --output-file sbom-python.cdx.json

      - name: Cache cargo (SBOM tools)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-sbom-${{ hashFiles('pydantable-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-sbom-

      - name: Install SBOM tools (Rust)
        run: cargo install cargo-cyclonedx

      - name: Create Rust SBOM (crate)
        run: cargo cyclonedx --manifest-path pydantable-core/Cargo.toml --format json --override-filename sbom-rust.cdx

      - name: Verify SBOM files exist
        run: |
          test -s sbom-python.cdx.json
          test -s pydantable-core/sbom-rust.cdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v5
        with:
          name: sbom-cyclonedx
          path: |
            sbom-python.cdx.json
            pydantable-core/sbom-rust.cdx.json
