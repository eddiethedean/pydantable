# Build the pydantable-rag vector SQLite DB from monorepo docs/ (CPU models).
# Uploads an artifact you can download or that FastAPI Cloud deploy reuses.

name: RAG vector database

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "docs/**"
      - "pydantable-rag/**"
      - ".github/workflows/rag-database.yml"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "pydantable-rag/**"
      - ".github/workflows/rag-database.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync pydantable-rag
        working-directory: pydantable-rag
        run: uv sync --all-extras

      - name: Build vector database
        working-directory: pydantable-rag
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: uv run python scripts/build_index_ci.py

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: pydantable_vectors.db
          path: pydantable-rag/data/pydantable_vectors.db
          if-no-files-found: error
