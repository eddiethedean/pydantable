# Material for MkDocs — Polars-style product docs (see docs/mkdocs_hooks.py for RTD import path).
site_name: pydantable
site_description: Strongly-typed DataFrames for FastAPI and Pydantic, Rust/Polars execution core.
site_author: pydantable contributors
site_url: https://pydantable.readthedocs.io/en/latest/

repo_url: https://github.com/eddiethedean/pydantable
edit_uri: edit/main/docs/

docs_dir: docs

# Allow links to repo files outside ``docs/`` (``../``) used in ROADMAP / PERFORMANCE.
validation:
  links:
    unrecognized_links: ignore
    not_found: ignore

hooks:
  - docs/mkdocs_hooks.py

exclude_docs: |
  async_ideas/**
  examples/fastapi/service_layout/README.md

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [python, pydantable-protocol/python]
          options:
            docstring_style: google
            docstring_section_style: table
            show_root_heading: true
            show_root_full_path: true
            show_symbol_type_heading: true
            show_source: true
            show_if_no_docstring: false
            members_order: source
            separate_signature: true
            line_length: 100

markdown_extensions:
  - meta
  - md_in_html
  - toc:
      permalink: true
  - tables
  - attr_list
  - def_list
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      # Repo root for ``README.md`` include; ``docs/`` for ``examples/...`` snippets.
      base_path: [".", "docs"]
      check_paths: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css
  - stylesheets/chat-widget.css

extra_javascript:
  - javascripts/chat-launcher.js

