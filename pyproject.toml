[build-system]
requires = ["maturin>=1.4,<2.0"]
build-backend = "maturin"

[project]
name = "pydantable"
version = "0.14.0"
description = "Strongly-typed DataFrames for Python, powered by Rust."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "pydantic>=2.0,<3",
    "typing-extensions>=4.7",
]

[project.optional-dependencies]
polars = ["polars>=1.0.0,<2"]
dev = [
    "fastapi>=0.100",
    "httpx>=0.24",
    "hypothesis>=6.0",
    "numpy>=1.24",
    "pyarrow>=14.0",
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "pytest-xdist>=3.0",
    "coverage[toml]>=7.0",
    "polars>=1.0.0,<2",
]
benchmark = [
    "maturin>=1.4,<2.0",
    "pandas>=2.0",
    "polars>=1.0.0,<2",
]
pandas = ["pandas>=2.0"]
docs = [
    "sphinx",
    "myst-parser",
    "sphinx-autodoc-typehints",
    "sphinx-copybutton",
    "sphinx-rtd-theme",
]

[tool.maturin]
# Builds `pydantable._core` from the Rust crate in `pydantable-core/`.
manifest-path = "pydantable-core/Cargo.toml"
module-name = "pydantable._core"
python-source = "python"
features = ["pyo3/extension-module", "polars_engine"]

[tool.ruff]
target-version = "py310"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "TCH", "TID", "RUF"]

[tool.mypy]
python_version = "3.10"
mypy_path = "python"
explicit_package_bases = true

# Tests use parametrized UI bases and column attrs that are Expr at runtime but
# look like optional scalars to static analysis; typecheck the package only.
[[tool.mypy.overrides]]
module = "tests.*"
ignore_errors = true

# Optional runtime deps: CI python-lint job does not install them; imports are guarded.
[[tool.mypy.overrides]]
module = "pyarrow"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "polars"
ignore_missing_imports = true

[tool.pytest.ini_options]
pythonpath = ["python"]
testpaths = ["tests"]
markers = [
    "slow: performance guardrails (timing-based; exclude with -m 'not slow')",
]

[tool.coverage.run]
branch = true
source = ["python/pydantable"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if typing.TYPE_CHECKING:",
]

