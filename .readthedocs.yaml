version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
  jobs:
    pre_install:
      - pip install -U pip
      # Do not `pip install .[docs]` here: that runs maturin and compiles the full Rust
      # crate (Polars, etc.), which often OOMs or times out on RTD builders. The Sphinx
      # config adds `python/` to sys.path; pydantable imports without `pydantable._core`.
      - >-
        pip install
        "sphinx>=7,<9"
        "myst-parser>=3"
        sphinx-autodoc-typehints
        sphinx-copybutton
        sphinx-rtd-theme
        "pydantic>=2,<3"
        "typing-extensions>=4.7"
        "sqlalchemy>=2,<3"

sphinx:
  builder: html
  configuration: docs/conf.py
  fail_on_warning: true

